<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>소모품 관리</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="소모품관리" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <script src="https://cdn.tailwindcss.com/3.4.1"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .tab-active { border-bottom: 2px solid #2563eb; color: #2563eb; font-weight: 600; }
    .tab-inactive { border-bottom: 2px solid transparent; color: #6b7280; }
    .nav-active { color: #2563eb; }
    .nav-inactive { color: #9ca3af; }
    input, select, textarea { font-size: 16px !important; }
    .badge-low { background: #fef2f2; color: #dc2626; }
    .badge-ok  { background: #f0fdf4; color: #16a34a; }
    .fade-in { animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- ===================== AUTH SCREEN ===================== -->
<div id="authScreen" class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm bg-white rounded-2xl shadow-lg p-6">
    <div class="text-center mb-6">
      <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-3">
        <svg class="w-9 h-9 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10"/>
        </svg>
      </div>
      <h1 class="text-xl font-bold text-gray-900">소모품 관리</h1>
      <p class="text-sm text-gray-500 mt-1">팀 공유 재고 관리 시스템</p>
    </div>

    <!-- 탭 -->
    <div class="flex mb-5 border-b">
      <button id="tabLoginBtn" onclick="showTab('login')" class="flex-1 py-2 text-sm tab-active">로그인</button>
      <button id="tabSignupBtn" onclick="showTab('signup')" class="flex-1 py-2 text-sm tab-inactive">회원가입</button>
    </div>

    <!-- 로그인 폼 -->
    <div id="loginForm">
      <div class="space-y-3">
        <input id="loginEmail" type="email" placeholder="이메일" class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100" />
        <input id="loginPassword" type="password" placeholder="비밀번호" class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100" />
        <button onclick="doLogin()" class="w-full bg-blue-600 text-white rounded-xl py-3 text-sm font-semibold hover:bg-blue-700 active:bg-blue-800 transition-colors">로그인</button>
      </div>
    </div>

    <!-- 회원가입 폼 -->
    <div id="signupForm" class="hidden">
      <div class="space-y-3">
        <input id="signupName" type="text" placeholder="이름" class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100" />
        <input id="signupEmail" type="email" placeholder="이메일" class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100" />
        <input id="signupPassword" type="password" placeholder="비밀번호 (6자 이상)" class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100" />
        <button onclick="doSignup()" class="w-full bg-blue-600 text-white rounded-xl py-3 text-sm font-semibold hover:bg-blue-700 active:bg-blue-800 transition-colors">회원가입</button>
      </div>
    </div>

    <div id="authMsg" class="mt-3 text-sm text-center text-red-500 hidden"></div>
  </div>
</div>

<!-- ===================== MAIN APP ===================== -->
<div id="mainApp" class="hidden max-w-lg mx-auto">

  <!-- 상단 헤더 -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-30">

      </div>

      <h2 class="text-sm font-semibold text-gray-700 mt-5 mb-3">최근 거래 내역</h2>
      <div id="txList" class="space-y-2"></div>

    <!-- 알림 탭 -->

      <h2 class="text-sm font-semibold text-gray-700 mb-3">재고 알림</h2>
      <div id="alertList" class="space-y-2"></div>

          <p class="text-xs text-gray-500 mb-1">로그인 계정</p>
          <p id="settingsEmail" class="text-sm font-medium text-gray-800"></p>

        <div class="p-4">
          <p class="text-xs text-gray-500 mb-1">버전</p>

        <div class="p-4">
          <button onclick="doLogout()" class="text-sm text-red-500 font-medium">로그아웃</button>

    </div>

  </main>

  <!-- 하단 네비게이션 -->

        <span class="text-xs mt-0.5">입출고</span>

<!-- ===================== 품목 추가 모달 ===================== -->

<!-- ===================== 입출고 모달 (재고카드에서 직접) ===================== -->

    <div class="flex justify-between items-center mb-4">
      <h3 id="quickTxTitle" class="text-base font-bold text-gray-900">입출고</h3>
      <button onclick="hideModal('modalQuickTx')" class="text-gray-400 hover:text-gray-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>

    </div>
    <div class="flex gap-2 mb-4">
      <button id="quickBtnIn" onclick="setQuickType('in')" class="flex-1 py-2.5 text-sm rounded-xl border-2 border-blue-500 bg-blue-50 text-blue-700 font-semibold">입고</button>

<!-- 토스트 알림 -->
<div id="toast" class="hidden fixed top-4 left-1/2 -translate-x-1/2 z-50 bg-gray-900 text-white text-sm px-5 py-3 rounded-2xl shadow-lg max-w-xs text-center"></div>

<script>
// ===================== SUPABASE 설정 =====================
// ⚠️ 아래 두 줄을 실제 값으로 교체하세요!
const SUPABASE_URL      = 'https://hjtfrbwakcjpqcrztpij.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhqdGZyYndha2NqcHFjcnp0cGlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NDYxNTUsImV4cCI6MjA5NTUyMjE1NX0.8d8bkHFYFV8BrR4kR-OHg3NiOTqBiXDPdeTM5q513RA';

let _supabase = null;
let currentUser = null;
let stockItems = [];
let txType = 'in';
let quickTxItemId = null;
let quickTxType = 'in';

// Supabase 초기화
function initSupabase() {
  try {
    _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    return true;
  } catch(e) {
    showToast('Supabase 연결 실패: ' + e.message);
    return false;
  }
}

// ===================== 인증 =====================
function showTab(tab) {
  const loginForm  = document.getElementById('loginForm');
  const signupForm = document.getElementById('signupForm');
  const tabLogin   = document.getElementById('tabLoginBtn');
  const tabSignup  = document.getElementById('tabSignupBtn');

  if (tab === 'login') {
    loginForm.classList.remove('hidden');
    signupForm.classList.add('hidden');
    tabLogin.className  = 'flex-1 py-2 text-sm tab-active';
    tabSignup.className = 'flex-1 py-2 text-sm tab-inactive';
  } else {
    loginForm.classList.add('hidden');
    signupForm.classList.remove('hidden');
    tabLogin.className  = 'flex-1 py-2 text-sm tab-inactive';
    tabSignup.className = 'flex-1 py-2 text-sm tab-active';
  }
  document.getElementById('authMsg').classList.add('hidden');
}

function showAuthMsg(msg, isError) {
  const el = document.getElementById('authMsg');
  el.textContent = msg;
  el.className = 'mt-3 text-sm text-center ' + (isError ? 'text-red-500' : 'text-green-600');
  el.classList.remove('hidden');
}

async function doLogin() {
  if (!_supabase) { showAuthMsg('Supabase가 연결되지 않았습니다. URL과 키를 확인하세요.', true); return; }
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPassword').value;
  if (!email || !pass) { showAuthMsg('이메일과 비밀번호를 입력하세요.', true); return; }
  showAuthMsg('로그인 중...', false);
  const { data, error } = await _supabase.auth.signInWithPassword({ email, password: pass });
  if (error) { showAuthMsg(error.message, true); return; }
  currentUser = data.user;
  enterApp();
}

async function doSignup() {
  if (!_supabase) { showAuthMsg('Supabase가 연결되지 않았습니다. URL과 키를 확인하세요.', true); return; }
  const name  = document.getElementById('signupName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const pass  = document.getElementById('signupPassword').value;
  if (!name || !email || !pass) { showAuthMsg('모든 항목을 입력하세요.', true); return; }
  if (pass.length < 6) { showAuthMsg('비밀번호는 6자 이상이어야 합니다.', true); return; }
  showAuthMsg('가입 중...', false);
  const { data, error } = await _supabase.auth.signUp({
    email, password: pass,
    options: { data: { name } }
  });
  if (error) { showAuthMsg(error.message, true); return; }
  if (data.user && !data.user.confirmed_at) {
    showAuthMsg('가입 완료! 이메일 인증 없이 로그인하세요.', false);
    document.getElementById('loginEmail').value    = email;
    document.getElementById('loginPassword').value = pass;
    showTab('login');
  } else {
    currentUser = data.user;
    enterApp();
  }
}

async function doLogout() {
  if (_supabase) await _supabase.auth.signOut();
  currentUser = null;
  stockItems = [];
  document.getElementById('mainApp').classList.add('hidden');
  document.getElementById('authScreen').classList.remove('hidden');
  showTab('login');
}

function enterApp() {
  document.getElementById('authScreen').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');
  const email = currentUser.email || '';
  document.getElementById('userInfo').textContent     = email;
  document.getElementById('settingsEmail').textContent = email;
  loadAll();
  subscribeRealtime();
}

// ===================== 데이터 로드 =====================
async function loadAll() {
  await loadItems();
  await loadTx();
  await loadAlerts();
}

async function loadItems() {
  if (!_supabase) return;
  const { data, error } = await _supabase
    .from('stock_items')
    .select('*')
    .order('name');
  if (error) { showToast('재고 불러오기 실패: ' + error.message); return; }
  stockItems = data || [];
  renderItems();
  populateTxSelect();
}

async function loadTx() {
  if (!_supabase) return;
  const { data, error } = await _supabase
    .from('stock_logs')
    .select('*, stock_items(name)')
    .order('created_at', { ascending: false })
    .limit(50);
  if (error) return;
  renderTxList(data || []);
}

async function loadAlerts() {
  if (!_supabase) return;
  const alerts = stockItems.filter(function(i) {
    return i.quantity <= i.min_quantity && i.min_quantity > 0;
  });
  renderAlertList(alerts);
  const badge = document.getElementById('alertBadge');
  if (alerts.length > 0) {
    badge.classList.remove('hidden');
  } else {
    badge.classList.add('hidden');
  }
}

// ===================== 렌더링 =====================
function renderItems() {
  const keyword = (document.getElementById('searchInput').value || '').toLowerCase();
  const filtered = stockItems.filter(function(i) {
    return i.name.toLowerCase().includes(keyword);
  });
  const container = document.getElementById('itemList');
  if (filtered.length === 0) {
    container.innerHTML = '<p class="text-center text-sm text-gray-400 py-10">등록된 품목이 없습니다</p>';
    return;
  }
  container.innerHTML = filtered.map(function(item) {
    const isLow = item.quantity <= item.min_quantity && item.min_quantity > 0;
    const badgeClass = isLow ? 'badge-low' : 'badge-ok';
    const badgeText  = isLow ? '부족' : '정상';
    return (
      '<div class="bg-white rounded-2xl border border-gray-200 p-4 flex items-center justify-between">' +
        '<div>' +
          '<div class="flex items-center gap-2">' +
            '<span class="text-sm font-semibold text-gray-900">' + escHtml(item.name) + '</span>' +
            '<span class="text-xs px-2 py-0.5 rounded-full ' + badgeClass + '">' + badgeText + '</span>' +
          '</div>' +
          '<p class="text-xs text-gray-400 mt-0.5">' +
            (item.category ? escHtml(item.category) + ' · ' : '') +
            '최소 ' + item.min_quantity + (item.unit || '') +
          '</p>' +
        '</div>' +
        '<div class="flex items-center gap-3">' +
          '<div class="text-right">' +
            '<p class="text-lg font-bold ' + (isLow ? 'text-red-500' : 'text-blue-600') + '">' + item.quantity + '</p>' +
            '<p class="text-xs text-gray-400">' + (item.unit || '개') + '</p>' +
          '</div>' +
          '<button onclick="openQuickTx('' + item.id + '', '' + escHtml(item.name) + '')" class="p-2 bg-gray-100 rounded-xl hover:bg-gray-200">' +
            '<svg class="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>' +
          '</button>' +
        '</div>' +
      '</div>'
    );
  }).join('');
}

function renderTxList(list) {
  const container = document.getElementById('txList');
  if (list.length === 0) {
    container.innerHTML = '<p class="text-center text-sm text-gray-400 py-8">거래 내역이 없습니다</p>';
    return;
  }
  container.innerHTML = list.map(function(tx) {
    const isIn = tx.type === 'in';
    const colorClass = isIn ? 'text-green-600' : 'text-red-500';
    const sign = isIn ? '+' : '-';
    const dt = new Date(tx.created_at);
    const dateStr = (dt.getMonth()+1) + '/' + dt.getDate() + ' ' + dt.getHours() + ':' + String(dt.getMinutes()).padStart(2,'0');
    const itemName = tx.stock_items ? tx.stock_items.name : '';
    return (
      '<div class="bg-white rounded-xl border border-gray-200 px-4 py-3 flex justify-between items-center">' +
        '<div>' +
          '<p class="text-sm font-medium text-gray-900">' + escHtml(itemName) + '</p>' +
          '<p class="text-xs text-gray-400">' + dateStr + (tx.note ? ' · ' + escHtml(tx.note) : '') + '</p>' +
        '</div>' +
        '<p class="text-base font-bold ' + colorClass + '">' + sign + tx.quantity + (tx.unit || '') + '</p>' +
      '</div>'
    );
  }).join('');
}

function renderAlertList(alerts) {
  const container = document.getElementById('alertList');
  if (alerts.length === 0) {
    container.innerHTML = '<div class="bg-white rounded-2xl border border-gray-200 p-8 text-center"><p class="text-sm text-gray-400">부족한 재고가 없습니다</p></div>';
    return;
  }
  container.innerHTML = alerts.map(function(item) {
    return (
      '<div class="bg-red-50 border border-red-200 rounded-2xl p-4 flex justify-between items-center">' +
        '<div>' +
          '<p class="text-sm font-semibold text-red-700">' + escHtml(item.name) + '</p>' +
          '<p class="text-xs text-red-400 mt-0.5">현재 ' + item.quantity + ' / 최소 ' + item.min_quantity + (item.unit || '') + '</p>' +
        '</div>' +
        '<span class="text-xs font-semibold bg-red-100 text-red-600 px-3 py-1 rounded-full">보충 필요</span>' +
      '</div>'
    );
  }).join('');
}

function populateTxSelect() {
  const sel = document.getElementById('txItem');
  const cur = sel.value;
  sel.innerHTML = '<option value="">-- 선택하세요 --</option>';
  stockItems.forEach(function(item) {
    const opt = document.createElement('option');
    opt.value = item.id;
    opt.textContent = item.name + ' (' + item.quantity + (item.unit || '개') + ')';
    sel.appendChild(opt);
  });
  if (cur) sel.value = cur;
}

// ===================== 품목 추가 =====================
async function addItem() {
  const name     = document.getElementById('newItemName').value.trim();
  const category = document.getElementById('newItemCategory').value.trim();
  const unit     = document.getElementById('newItemUnit').value.trim();
  const qty      = parseInt(document.getElementById('newItemQty').value) || 0;
  const minQty   = parseInt(document.getElementById('newItemMin').value) || 0;
  if (!name) { showToast('품목명을 입력하세요'); return; }
  const { error } = await _supabase.from('stock_items').insert({
    name, category, unit,
    quantity: qty,
    min_quantity: minQty
  });
  if (error) { showToast('추가 실패: ' + error.message); return; }
  showToast(name + ' 추가 완료!');
  hideModal('modalAddItem');
  document.getElementById('newItemName').value     = '';
  document.getElementById('newItemCategory').value = '';
  document.getElementById('newItemUnit').value     = '';
  document.getElementById('newItemQty').value      = '';
  document.getElementById('newItemMin').value      = '';
  await loadItems();
}

// ===================== 입출고 =====================
function setTxType(type) {
  txType = type;
  const btnIn  = document.getElementById('btnInbound');
  const btnOut = document.getElementById('btnOutbound');
  if (type === 'in') {
    btnIn.className  = 'flex-1 py-2.5 text-sm rounded-xl border-2 border-blue-500 bg-blue-50 text-blue-700 font-semibold';
    btnOut.className = 'flex-1 py-2.5 text-sm rounded-xl border-2 border-gray-200 text-gray-500';
  } else {
    btnOut.className = 'flex-1 py-2.5 text-sm rounded-xl border-2 border-red-500 bg-red-50 text-red-700 font-semibold';
    btnIn.className  = 'flex-1 py-2.5 text-sm rounded-xl border-2 border-gray-200 text-gray-500';
  }
}

async function doTransaction() {
  const itemId = document.getElementById('txItem').value;
  const qty    = parseInt(document.getElementById('txQty').value);
  const note   = document.getElementById('txNote').value.trim();
  if (!itemId) { showToast('품목을 선택하세요'); return; }
  if (!qty || qty < 1) { showToast('수량을 1 이상 입력하세요'); return; }
  await processStock(itemId, txType, qty, note);
  document.getElementById('txQty').value  = '';
  document.getElementById('txNote').value = '';
}

// 빠른 입출고 (재고 카드)
function openQuickTx(itemId, itemName) {
  quickTxItemId = itemId;
  quickTxType = 'in';
  document.getElementById('quickTxTitle').textContent = itemName + ' 입출고';
  document.getElementById('quickQty').value  = '';
  document.getElementById('quickNote').value = '';
  setQuickType('in');
  document.getElementById('modalQuickTx').classList.remove('hidden');
}

function setQuickType(type) {
  quickTxType = type;
  const btnIn  = document.getElementById('quickBtnIn');
  const btnOut = document.getElementById('quickBtnOut');
  if (type === 'in') {
    btnIn.className  = 'flex-1 py-2.5 text-sm rounded-xl border-2 border-blue-500 bg-blue-50 text-blue-700 font-semibold';
    btnOut.className = 'flex-1 py-2.5 text-sm rounded-xl border-2 border-gray-200 text-gray-500';
  } else {
    btnOut.className = 'flex-1 py-2.5 text-sm rounded-xl border-2 border-red-500 bg-red-50 text-red-700 font-semibold';
    btnIn.className  = 'flex-1 py-2.5 text-sm rounded-xl border-2 border-gray-200 text-gray-500';
  }
}

async function doQuickTx() {
  const qty  = parseInt(document.getElementById('quickQty').value);
  const note = document.getElementById('quickNote').value.trim();
  if (!qty || qty < 1) { showToast('수량을 1 이상 입력하세요'); return; }
  hideModal('modalQuickTx');
  await processStock(quickTxItemId, quickTxType, qty, note);
}

async function processStock(itemId, type, qty, note) {
  const item = stockItems.find(function(i) { return i.id === itemId; });
  if (!item) { showToast('품목을 찾을 수 없습니다'); return; }
  const newQty = type === 'in' ? item.quantity + qty : item.quantity - qty;
  if (newQty < 0) { showToast('재고 부족! 현재: ' + item.quantity + (item.unit || '개')); return; }
  const { error: updateErr } = await _supabase
    .from('stock_items')
    .update({ quantity: newQty, updated_at: new Date().toISOString() })
    .eq('id', itemId);
  if (updateErr) { showToast('업데이트 실패: ' + updateErr.message); return; }
  const { error: logErr } = await _supabase.from('stock_logs').insert({
    item_id: itemId,
    type: type,
    quantity: qty,
    note: note || null,
    user_id: currentUser.id,
    user_email: currentUser.email
  });
  if (logErr) console.warn('로그 저장 실패:', logErr.message);
  const label = type === 'in' ? '입고' : '출고';
  showToast(item.name + ' ' + qty + (item.unit || '개') + ' ' + label + ' 완료');
  await loadAll();
}

// ===================== 실시간 동기화 =====================
function subscribeRealtime() {
  if (!_supabase) return;
  _supabase
    .channel('stock-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'stock_items' }, function() {
      loadItems();
    })
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'stock_logs' }, function() {
      loadTx();
    })
    .subscribe();
}

// ===================== UI 헬퍼 =====================
function showPage(page) {
  var pages = ['stock','transaction','alerts','settings'];
  pages.forEach(function(p) {
    var el = document.getElementById('page' + p.charAt(0).toUpperCase() + p.slice(1));
    if (el) el.classList.add('hidden');
    var nav = document.getElementById('nav-' + p);
    if (nav) nav.className = 'flex-1 flex flex-col items-center py-2.5 nav-inactive';
  });
  var active = document.getElementById('page' + page.charAt(0).toUpperCase() + page.slice(1));
  if (active) active.classList.remove('hidden');
  var activeNav = document.getElementById('nav-' + page);
  if (activeNav) activeNav.className = 'flex-1 flex flex-col items-center py-2.5 nav-active';
  if (page === 'transaction') loadTx();
  if (page === 'alerts') loadAlerts();
}

function showAddItem() {
  document.getElementById('modalAddItem').classList.remove('hidden');
}

function hideModal(id) {
  document.getElementById(id).classList.add('hidden');
}

function showAlerts() {
  showPage('alerts');
}

function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.remove('hidden');
  setTimeout(function() { el.classList.add('hidden'); }, 2800);
}

function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ===================== 앱 시작 =====================
window.addEventListener('DOMContentLoaded', async function() {
  if (!initSupabase()) return;
  const { data } = await _supabase.auth.getSession();
  if (data.session && data.session.user) {
    currentUser = data.session.user;
    enterApp();
  }
  _supabase.auth.onAuthStateChange(function(event, session) {
    if (event === 'SIGNED_IN' && session) {
      currentUser = session.user;
    }
  });
});

// 서비스 워커 등록
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js').catch(function() {});
  });
}
</script>
