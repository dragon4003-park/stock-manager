<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>소모품 관리 시스템</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }

/* 페이지 */
.page { display: none; }
.page.active { display: block; }

/* 로그인/회원가입 */
.auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.auth-box { background: #fff; border-radius: 12px; padding: 40px 32px; width: 100%; max-width: 400px; box-shadow: 0 2px 16px rgba(0,0,0,0.1); }
.auth-box h2 { font-size: 22px; margin-bottom: 24px; text-align: center; }
.auth-box input { width: 100%; padding: 12px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; margin-bottom: 14px; outline: none; }
.auth-box input:focus { border-color: #4f46e5; }
.btn-primary { width: 100%; padding: 13px; background: #4f46e5; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 4px; }
.btn-primary:hover { background: #4338ca; }
.auth-switch { text-align: center; margin-top: 18px; font-size: 14px; color: #666; }
.auth-switch span { color: #4f46e5; cursor: pointer; font-weight: 600; }
.auth-switch span:hover { text-decoration: underline; }
.msg { padding: 10px 14px; border-radius: 6px; font-size: 14px; margin-bottom: 14px; display: none; }
.msg.error { background: #fee2e2; color: #b91c1c; display: block; }
.msg.success { background: #dcfce7; color: #15803d; display: block; }

/* 메인 */
header { background: #4f46e5; color: #fff; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
header h1 { font-size: 18px; }
#user-info { font-size: 13px; opacity: 0.85; }
.logout-btn { background: rgba(255,255,255,0.2); border: none; color: #fff; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.logout-btn:hover { background: rgba(255,255,255,0.35); }

.tabs { display: flex; background: #fff; border-bottom: 1px solid #e5e7eb; }
.tab { flex: 1; padding: 14px; text-align: center; cursor: pointer; font-size: 15px; color: #666; border-bottom: 3px solid transparent; }
.tab.active { color: #4f46e5; border-bottom-color: #4f46e5; font-weight: 600; }

.tab-content { display: none; padding: 16px; }
.tab-content.active { display: block; }

/* 재고 */
.add-form { background: #fff; border-radius: 10px; padding: 18px; margin-bottom: 16px; }
.add-form h3 { font-size: 15px; margin-bottom: 14px; color: #333; }
.form-row { display: flex; gap: 10px; margin-bottom: 10px; }
.form-row input { flex: 1; padding: 10px 12px; border: 1px solid #ddd; border-radius: 7px; font-size: 14px; outline: none; }
.form-row input:focus { border-color: #4f46e5; }
.btn-add { padding: 10px 20px; background: #4f46e5; color: #fff; border: none; border-radius: 7px; cursor: pointer; font-size: 14px; white-space: nowrap; }
.btn-add:hover { background: #4338ca; }

.item-card { background: #fff; border-radius: 10px; padding: 16px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
.item-name { font-size: 16px; font-weight: 600; color: #111; }
.item-qty { font-size: 22px; font-weight: 700; color: #4f46e5; }
.item-qty.low { color: #dc2626; }
.item-min { font-size: 12px; color: #999; }
.item-actions { display: flex; gap: 8px; margin-top: 8px; }
.btn-in { padding: 7px 14px; background: #10b981; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
.btn-out { padding: 7px 14px; background: #f59e0b; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
.btn-del { padding: 7px 14px; background: #ef4444; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
.item-left { flex: 1; }
.item-right { text-align: right; }

/* 이력 */
.history-item { background: #fff; border-radius: 8px; padding: 14px; margin-bottom: 8px; }
.history-top { display: flex; justify-content: space-between; align-items: center; }
.history-name { font-weight: 600; font-size: 15px; }
.badge { padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.badge.in { background: #d1fae5; color: #065f46; }
.badge.out { background: #fef3c7; color: #92400e; }
.history-detail { font-size: 13px; color: #666; margin-top: 6px; }

.empty { text-align: center; padding: 40px; color: #999; font-size: 15px; }

/* 모달 */
.modal-bg { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
.modal-bg.open { display: flex; }
.modal { background: #fff; border-radius: 12px; padding: 28px; width: 300px; }
.modal h3 { font-size: 17px; margin-bottom: 18px; }
.modal input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 7px; font-size: 14px; margin-bottom: 12px; outline: none; }
.modal input:focus { border-color: #4f46e5; }
.modal-btns { display: flex; gap: 8px; }
.btn-confirm { flex: 1; padding: 10px; background: #4f46e5; color: #fff; border: none; border-radius: 7px; cursor: pointer; font-size: 14px; }
.btn-cancel { flex: 1; padding: 10px; background: #f3f4f6; color: #333; border: none; border-radius: 7px; cursor: pointer; font-size: 14px; }
</style>
</head>
<body>

<!-- 로그인 페이지 -->
<div id="page-login" class="page active">
  <div class="auth-wrap">
    <div class="auth-box">
      <h2>소모품 관리 시스템</h2>
      <div id="login-msg" class="msg"></div>
      <input type="email" id="login-email" placeholder="이메일 주소" autocomplete="email">
      <input type="password" id="login-pw" placeholder="비밀번호" autocomplete="current-password">
      <button class="btn-primary" onclick="doLogin()">로그인</button>
      <div class="auth-switch">계정이 없으신가요? <span onclick="showPage('page-signup')">회원가입</span></div>
    </div>
  </div>
</div>

<!-- 회원가입 페이지 -->
<div id="page-signup" class="page">
  <div class="auth-wrap">
    <div class="auth-box">
      <h2>회원가입</h2>
      <div id="signup-msg" class="msg"></div>
      <input type="text" id="signup-name" placeholder="이름">
      <input type="email" id="signup-email" placeholder="이메일 주소" autocomplete="email">
      <input type="password" id="signup-pw" placeholder="비밀번호 (6자 이상)" autocomplete="new-password">
      <button class="btn-primary" onclick="doSignup()">회원가입</button>
      <div class="auth-switch">이미 계정이 있으신가요? <span onclick="showPage('page-login')">로그인</span></div>
    </div>
  </div>
</div>

<!-- 메인 페이지 -->
<div id="page-main" class="page">
  <header>
    <h1>소모품 관리 시스템</h1>
    <div>
      <span id="user-info"></span>
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </header>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('tab-stock', this)">재고 현황</div>
    <div class="tab" onclick="switchTab('tab-history', this)">입출고 이력</div>
  </div>

  <!-- 재고 탭 -->
  <div id="tab-stock" class="tab-content active">
    <div class="add-form">
      <h3>품목 추가</h3>
      <div class="form-row">
        <input type="text" id="new-name" placeholder="품목명">
        <input type="number" id="new-qty" placeholder="수량" min="0">
        <input type="number" id="new-min" placeholder="최소수량" min="0">
        <button class="btn-add" onclick="addItem()">추가</button>
      </div>
    </div>
    <div id="stock-list"><div class="empty">품목을 추가해주세요</div></div>
  </div>

  <!-- 이력 탭 -->
  <div id="tab-history" class="tab-content">
    <div id="history-list"><div class="empty">이력이 없습니다</div></div>
  </div>
</div>

<!-- 입출고 모달 -->
<div id="modal" class="modal-bg">
  <div class="modal">
    <h3 id="modal-title">입고</h3>
    <input type="number" id="modal-qty" placeholder="수량" min="1">
    <input type="text" id="modal-memo" placeholder="메모 (선택사항)">
    <div class="modal-btns">
      <button class="btn-confirm" onclick="confirmModal()">확인</button>
      <button class="btn-cancel" onclick="closeModal()">취소</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ====== Supabase 설정 ======
var SUPABASE_URL = 'https://hjtfrbwakcjpqcrztpij.supabase.co';
var SUPABASE_KEY = 'sb_publishable_MprppdoI1yJmFQcoSCvF9g_Q76n5xH2';
var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
// ==========================

var currentUser = null;
var currentAction = null; // {type:'in'|'out', itemId, itemName}

// 페이지 전환
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(function(p) {
    p.classList.remove('active');
  });
  document.getElementById(pageId).classList.add('active');
}

// 탭 전환
function switchTab(tabId, el) {
  document.querySelectorAll('.tab-content').forEach(function(t) {
    t.classList.remove('active');
  });
  document.querySelectorAll('.tab').forEach(function(t) {
    t.classList.remove('active');
  });
  document.getElementById(tabId).classList.add('active');
  el.classList.add('active');
  if (tabId === 'tab-history') loadHistory();
}

// 메시지 표시
function showMsg(id, text, type) {
  var el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + type;
}

// 로그인
async function doLogin() {
  var email = document.getElementById('login-email').value.trim();
  var pw = document.getElementById('login-pw').value;
  if (!email || !pw) { showMsg('login-msg', '이메일과 비밀번호를 입력하세요.', 'error'); return; }
  var result = await supabase.auth.signInWithPassword({ email: email, password: pw });
  if (result.error) {
    showMsg('login-msg', '로그인 실패: ' + result.error.message, 'error');
  } else {
    currentUser = result.data.user;
    enterMain();
  }
}

// 회원가입
async function doSignup() {
  var name = document.getElementById('signup-name').value.trim();
  var email = document.getElementById('signup-email').value.trim();
  var pw = document.getElementById('signup-pw').value;
  if (!name || !email || !pw) { showMsg('signup-msg', '모든 항목을 입력하세요.', 'error'); return; }
  if (pw.length < 6) { showMsg('signup-msg', '비밀번호는 6자 이상이어야 합니다.', 'error'); return; }
  var result = await supabase.auth.signUp({ email: email, password: pw, options: { data: { name: name } } });
  if (result.error) {
    showMsg('signup-msg', '회원가입 실패: ' + result.error.message, 'error');
  } else {
    showMsg('signup-msg', '회원가입 성공! 로그인해주세요.', 'success');
    setTimeout(function() { showPage('page-login'); }, 1500);
  }
}

// 로그아웃
async function doLogout() {
  await supabase.auth.signOut();
  currentUser = null;
  showPage('page-login');
}

// 메인 진입
function enterMain() {
  var meta = currentUser.user_metadata;
  var name = (meta && meta.name) ? meta.name : currentUser.email;
  document.getElementById('user-info').textContent = name + '님  ';
  showPage('page-main');
  loadStock();
}

// 자동 로그인 체크
supabase.auth.getSession().then(function(res) {
  if (res.data && res.data.session && res.data.session.user) {
    currentUser = res.data.session.user;
    enterMain();
  }
});

// ====== 재고 ======
async function loadStock() {
  var result = await supabase.from('items').select('*').order('name');
  var list = document.getElementById('stock-list');
  if (result.error || !result.data || result.data.length === 0) {
    list.innerHTML = '<div class="empty">품목을 추가해주세요</div>';
    return;
  }
  list.innerHTML = result.data.map(function(item) {
    var low = item.min_qty > 0 && item.quantity <= item.min_qty;
    return '<div class="item-card">' +
      '<div class="item-left">' +
        '<div class="item-name">' + escHtml(item.name) + '</div>' +
        '<div class="item-min">최소수량: ' + (item.min_qty || 0) + '</div>' +
        '<div class="item-actions">' +
          '<button class="btn-in" onclick="openModal('in','' + item.id + '','' + escHtml(item.name) + '')">입고</button>' +
          '<button class="btn-out" onclick="openModal('out','' + item.id + '','' + escHtml(item.name) + '')">출고</button>' +
          '<button class="btn-del" onclick="deleteItem('' + item.id + '')">삭제</button>' +
        '</div>' +
      '</div>' +
      '<div class="item-right">' +
        '<div class="item-qty ' + (low ? 'low' : '') + '">' + item.quantity + '</div>' +
        (low ? '<div style="font-size:11px;color:#dc2626;">재고부족</div>' : '') +
      '</div>' +
    '</div>';
  }).join('');
}

async function addItem() {
  var name = document.getElementById('new-name').value.trim();
  var qty = parseInt(document.getElementById('new-qty').value) || 0;
  var min = parseInt(document.getElementById('new-min').value) || 0;
  if (!name) { alert('품목명을 입력하세요.'); return; }
  var result = await supabase.from('items').insert({ name: name, quantity: qty, min_qty: min });
  if (result.error) { alert('추가 실패: ' + result.error.message); return; }
  document.getElementById('new-name').value = '';
  document.getElementById('new-qty').value = '';
  document.getElementById('new-min').value = '';
  loadStock();
}

async function deleteItem(id) {
  if (!confirm('정말 삭제하시겠습니까?')) return;
  await supabase.from('items').delete().eq('id', id);
  loadStock();
}

// ====== 입출고 모달 ======
function openModal(type, itemId, itemName) {
  currentAction = { type: type, itemId: itemId, itemName: itemName };
  document.getElementById('modal-title').textContent = (type === 'in' ? '입고' : '출고') + ' — ' + itemName;
  document.getElementById('modal-qty').value = '';
  document.getElementById('modal-memo').value = '';
  document.getElementById('modal').classList.add('open');
  document.getElementById('modal-qty').focus();
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  currentAction = null;
}

async function confirmModal() {
  var qty = parseInt(document.getElementById('modal-qty').value);
  var memo = document.getElementById('modal-memo').value.trim();
  if (!qty || qty <= 0) { alert('수량을 입력하세요.'); return; }
  if (!currentAction) return;

  var itemRes = await supabase.from('items').select('quantity').eq('id', currentAction.itemId).single();
  if (itemRes.error) { alert('오류가 발생했습니다.'); return; }
  var current = itemRes.data.quantity;
  var newQty = currentAction.type === 'in' ? current + qty : current - qty;
  if (newQty < 0) { alert('재고가 부족합니다. 현재 재고: ' + current); return; }

  await supabase.from('items').update({ quantity: newQty }).eq('id', currentAction.itemId);

  var meta = currentUser.user_metadata;
  var userName = (meta && meta.name) ? meta.name : currentUser.email;
  await supabase.from('history').insert({
    item_id: currentAction.itemId,
    item_name: currentAction.itemName,
    type: currentAction.type,
    quantity: qty,
    memo: memo,
    user_name: userName,
    user_email: currentUser.email
  });

  closeModal();
  loadStock();
}

// ====== 이력 ======
async function loadHistory() {
  var result = await supabase.from('history').select('*').order('created_at', { ascending: false }).limit(100);
  var list = document.getElementById('history-list');
  if (result.error || !result.data || result.data.length === 0) {
    list.innerHTML = '<div class="empty">이력이 없습니다</div>';
    return;
  }
  list.innerHTML = result.data.map(function(h) {
    var d = new Date(h.created_at);
    var dateStr = d.toLocaleDateString('ko-KR') + ' ' + d.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'});
    return '<div class="history-item">' +
      '<div class="history-top">' +
        '<span class="history-name">' + escHtml(h.item_name) + '</span>' +
        '<span class="badge ' + h.type + '">' + (h.type === 'in' ? '입고 +' : '출고 -') + h.quantity + '</span>' +
      '</div>' +
      '<div class="history-detail">' + dateStr + ' · ' + escHtml(h.user_name || h.user_email) + (h.memo ? ' · ' + escHtml(h.memo) : '') + '</div>' +
    '</div>';
  }).join('');
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Enter 키 로그인/회원가입
document.getElementById('login-pw').addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
document.getElementById('signup-pw').addEventListener('keydown', function(e) { if (e.key === 'Enter') doSignup(); });
</script>
</body>
</html>
