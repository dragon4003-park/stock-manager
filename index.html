<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>소모품 관리 시스템</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Pretendard', -apple-system, sans-serif; background:#f0f4ff; min-height:100vh; }

    /* ── 로그인 ── */
    #loginPage {
      display:flex; align-items:center; justify-content:center;
      min-height:100vh;
      background: #1e3a8a;
    }
    .login-box {
      background:#fff; border-radius:16px; padding:48px 40px;
      width:100%; max-width:400px; box-shadow:0 8px 40px rgba(0,0,0,0.18);
    }
    .login-logo {
      text-align:center; margin-bottom:32px;
    }
    .login-logo .icon {
      font-size:48px; display:block; margin-bottom:10px;
    }
    .login-logo h1 { font-size:22px; color:#1e3a8a; font-weight:700; }
    .login-logo p { font-size:13px; color:#6b7280; margin-top:4px; }
    .login-box input {
      width:100%; padding:13px 16px; border:1.5px solid #d1d5db;
      border-radius:8px; font-size:15px; margin-bottom:12px;
      outline:none; transition:border .2s;
    }
    .login-box input:focus { border-color:#2563eb; }
    .btn-login {
      width:100%; padding:14px; background:#2563eb; color:#fff;
      border:none; border-radius:8px; font-size:16px; font-weight:600;
      cursor:pointer; transition:background .2s; margin-top:4px;
    }
    .btn-login:hover { background:#1d4ed8; }
    #loginError { color:#ef4444; font-size:13px; margin-top:10px; text-align:center; display:none; }

    /* ── 메인 ── */
    #mainPage { display:none; }
    .topbar {
      background:#1e3a8a; color:#fff; padding:0 24px;
      display:flex; align-items:center; justify-content:space-between;
      height:56px;
    }
    .topbar h1 { font-size:18px; font-weight:700; }
    .topbar-right { display:flex; align-items:center; gap:16px; }
    .topbar-right span { font-size:13px; opacity:.8; }
    .btn-logout {
      background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.3);
      color:#fff; padding:6px 14px; border-radius:6px; font-size:13px;
      cursor:pointer; transition:background .2s;
    }
    .btn-logout:hover { background:rgba(255,255,255,0.25); }

    /* 카드 요약 */
    .summary { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; padding:20px 24px 0; }
    .card {
      background:#fff; border-radius:12px; padding:20px;
      border:1px solid #e5e7eb;
    }
    .card .label { font-size:12px; color:#6b7280; margin-bottom:8px; font-weight:500; }
    .card .value { font-size:28px; font-weight:700; color:#1e3a8a; }
    .card.warn .value { color:#ef4444; }

    /* 탭 */
    .tabs { display:flex; gap:0; margin:20px 24px 0; border-bottom:2px solid #e5e7eb; }
    .tab {
      padding:10px 24px; font-size:14px; font-weight:600; cursor:pointer;
      color:#6b7280; border-bottom:2px solid transparent; margin-bottom:-2px;
      transition:color .2s;
    }
    .tab.active { color:#2563eb; border-bottom-color:#2563eb; }

    /* 콘텐츠 */
    .tab-content { padding:20px 24px; display:none; }
    .tab-content.active { display:block; }

    /* 툴바 */
    .toolbar { display:flex; gap:10px; margin-bottom:16px; align-items:center; }
    .toolbar input {
      padding:9px 14px; border:1.5px solid #d1d5db; border-radius:8px;
      font-size:14px; outline:none; flex:1; max-width:260px;
    }
    .toolbar input:focus { border-color:#2563eb; }
    .btn { padding:9px 18px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; border:none; transition:background .2s; }
    .btn-primary { background:#2563eb; color:#fff; }
    .btn-primary:hover { background:#1d4ed8; }
    .btn-green { background:#16a34a; color:#fff; }
    .btn-green:hover { background:#15803d; }
    .btn-red { background:#ef4444; color:#fff; }
    .btn-red:hover { background:#dc2626; }
    .btn-gray { background:#f3f4f6; color:#374151; border:1px solid #d1d5db; }
    .btn-gray:hover { background:#e5e7eb; }
    .btn-sm { padding:5px 12px; font-size:12px; }

    /* 테이블 */
    .tbl-wrap { background:#fff; border-radius:12px; border:1px solid #e5e7eb; overflow:hidden; }
    table { width:100%; border-collapse:collapse; }
    thead th { background:#f8fafc; padding:11px 16px; text-align:left; font-size:13px; color:#374151; font-weight:600; border-bottom:1px solid #e5e7eb; }
    tbody td { padding:11px 16px; font-size:14px; color:#111827; border-bottom:1px solid #f3f4f6; }
    tbody tr:last-child td { border-bottom:none; }
    tbody tr:hover { background:#f8fafc; }
    .badge { display:inline-block; padding:2px 10px; border-radius:4px; font-size:12px; font-weight:600; }
    .badge-green { background:#dcfce7; color:#16a34a; }
    .badge-red { background:#fee2e2; color:#ef4444; }
    .badge-in { background:#dbeafe; color:#1d4ed8; }
    .badge-out { background:#fef9c3; color:#b45309; }
    .low-stock td { background:#fff5f5 !important; }

    /* 모달 */
    .modal-bg {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45);
      z-index:100; align-items:center; justify-content:center;
    }
    .modal-bg.open { display:flex; }
    .modal {
      background:#fff; border-radius:14px; padding:32px; width:100%;
      max-width:420px; box-shadow:0 8px 40px rgba(0,0,0,0.2);
    }
    .modal h2 { font-size:18px; font-weight:700; color:#1e3a8a; margin-bottom:20px; }
    .modal input, .modal select {
      width:100%; padding:11px 14px; border:1.5px solid #d1d5db;
      border-radius:8px; font-size:14px; margin-bottom:12px; outline:none;
    }
    .modal input:focus, .modal select:focus { border-color:#2563eb; }
    .modal-btns { display:flex; gap:10px; margin-top:4px; }
    .modal-btns .btn { flex:1; padding:11px; }
    .empty { text-align:center; padding:40px; color:#9ca3af; font-size:14px; }
  </style>
</head>
<body>

<!-- ───────── 로그인 ───────── -->
<div id="loginPage">
  <div class="login-box">
    <div class="login-logo">
      <span class="icon">📦</span>
      <h1>소모품 관리 시스템</h1>
      <p>아주팜 재고 관리 플랫폼</p>
    </div>
    <input type="email" id="loginEmail" placeholder="이메일 주소"/>
    <input type="password" id="loginPw" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="btn-login" onclick="doLogin()">로그인</button>
    <p id="loginError">이메일 또는 비밀번호를 확인해주세요.</p>
  </div>
</div>

<!-- ───────── 메인 ───────── -->
<div id="mainPage">
  <div class="topbar">
    <h1>📦 소모품 관리 시스템</h1>
    <div class="topbar-right">
      <span id="userEmail"></span>
      <button class="btn-logout" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <!-- 요약 카드 -->
  <div class="summary">
    <div class="card"><div class="label">전체 품목</div><div class="value" id="cntTotal">0</div></div>
    <div class="card"><div class="label">총 재고 수량</div><div class="value" id="cntQty">0</div></div>
    <div class="card warn"><div class="label">재고 부족 품목</div><div class="value" id="cntLow">0</div></div>
    <div class="card"><div class="label">오늘 입출고</div><div class="value" id="cntToday">0</div></div>
  </div>

  <!-- 탭 -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('stock')">재고 현황</div>
    <div class="tab" onclick="switchTab('history')">입출고 이력</div>
  </div>

  <!-- 재고 현황 -->
  <div id="tab-stock" class="tab-content active">
    <div class="toolbar">
      <input type="text" id="searchInput" placeholder="품목 검색..." oninput="renderItems()"/>
      <button class="btn btn-primary" onclick="openAddModal()">+ 품목 추가</button>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>품목명</th><th style="text-align:right">현재 수량</th>
          <th style="text-align:right">최소 수량</th><th>상태</th><th>관리</th>
        </tr></thead>
        <tbody id="itemTbody"><tr><td colspan="5" class="empty">데이터를 불러오는 중...</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- 이력 -->
  <div id="tab-history" class="tab-content">
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>일시</th><th>품목명</th><th>구분</th>
          <th style="text-align:right">수량</th><th>메모</th><th>처리자</th>
        </tr></thead>
        <tbody id="histTbody"><tr><td colspan="6" class="empty">데이터를 불러오는 중...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<!-- ───────── 품목 추가 모달 ───────── -->
<div class="modal-bg" id="addModal">
  <div class="modal">
    <h2>품목 추가</h2>
    <input type="text" id="newName" placeholder="품목명"/>
    <input type="number" id="newQty" placeholder="초기 수량" min="0"/>
    <input type="number" id="newMinQty" placeholder="최소 수량 (부족 기준)" min="0"/>
    <div class="modal-btns">
      <button class="btn btn-gray" onclick="closeModal('addModal')">취소</button>
      <button class="btn btn-primary" onclick="addItem()">추가</button>
    </div>
  </div>
</div>

<!-- ───────── 입출고 모달 ───────── -->
<div class="modal-bg" id="txModal">
  <div class="modal">
    <h2 id="txTitle">입고</h2>
    <input type="number" id="txQty" placeholder="수량" min="1"/>
    <input type="text" id="txMemo" placeholder="메모 (선택)"/>
    <div class="modal-btns">
      <button class="btn btn-gray" onclick="closeModal('txModal')">취소</button>
      <button class="btn btn-primary" id="txConfirm" onclick="doTransaction()">확인</button>
    </div>
  </div>
</div>

<!-- ───────── 수정 모달 ───────── -->
<div class="modal-bg" id="editModal">
  <div class="modal">
    <h2>품목 수정</h2>
    <input type="text" id="editName" placeholder="품목명"/>
    <input type="number" id="editQty" placeholder="수량" min="0"/>
    <input type="number" id="editMinQty" placeholder="최소 수량" min="0"/>
    <div class="modal-btns">
      <button class="btn btn-gray" onclick="closeModal('editModal')">취소</button>
      <button class="btn btn-primary" onclick="saveEdit()">저장</button>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://hjtfrbwakcjpqcrztpij.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_MprppdoI1yJmFQcoSCvF9g_Q76n5xH2';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let currentUser = null;
  let items = [];
  let txItem = null;
  let txType = null;
  let editItem = null;

  // ── 인증 ──
  sb.auth.onAuthStateChange((event, session) => {
    if (session) {
      currentUser = session.user;
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('mainPage').style.display = 'block';
      document.getElementById('userEmail').textContent = currentUser.email;
      loadAll();
    } else {
      currentUser = null;
      document.getElementById('loginPage').style.display = 'flex';
      document.getElementById('mainPage').style.display = 'none';
    }
  });

  async function doLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const pw = document.getElementById('loginPw').value;
    const err = document.getElementById('loginError');
    err.style.display = 'none';
    const { error } = await sb.auth.signInWithPassword({ email, password: pw });
    if (error) { err.style.display = 'block'; }
  }

  async function doLogout() {
    await sb.auth.signOut();
  }

  // ── 데이터 로드 ──
  async function loadAll() {
    await loadItems();
    await loadHistory();
    updateSummary();
  }

  async function loadItems() {
    const { data, error } = await sb.from('items').select('*').order('name');
    if (!error) { items = data || []; }
    renderItems();
  }

  async function loadHistory() {
    const { data, error } = await sb.from('history').select('*').order('created_at', { ascending: false }).limit(100);
    if (!error) { renderHistory(data || []); }
  }

  function updateSummary() {
    document.getElementById('cntTotal').textContent = items.length;
    document.getElementById('cntQty').textContent = items.reduce((a,b) => a + (b.quantity||0), 0);
    document.getElementById('cntLow').textContent = items.filter(i => i.quantity <= i.min_qty).length;
  }

  async function updateTodayCount() {
    const today = new Date().toISOString().slice(0,10);
    const { count } = await sb.from('history').select('*', {count:'exact', head:true})
      .gte('created_at', today + 'T00:00:00')
      .lte('created_at', today + 'T23:59:59');
    document.getElementById('cntToday').textContent = count || 0;
  }

  // ── 렌더 ──
  function renderItems() {
    const q = (document.getElementById('searchInput').value || '').toLowerCase();
    const filtered = items.filter(i => i.name.toLowerCase().includes(q));
    const tbody = document.getElementById('itemTbody');
    if (!filtered.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty">품목이 없습니다.</td></tr>';
      return;
    }
    tbody.innerHTML = filtered.map(item => {
      const isLow = item.quantity <= item.min_qty;
      const badge = isLow
        ? '<span class="badge badge-red">부족</span>'
        : '<span class="badge badge-green">정상</span>';
      return `<tr class="${isLow ? 'low-stock' : ''}">
        <td><strong>${item.name}</strong></td>
        <td style="text-align:right;font-weight:700;color:${isLow?'#ef4444':'#111'}">${item.quantity}</td>
        <td style="text-align:right">${item.min_qty}</td>
        <td>${badge}</td>
        <td>
          <button class="btn btn-green btn-sm" onclick="openTx('${item.id}','in')">입고</button>
          <button class="btn btn-red btn-sm" style="margin:0 4px" onclick="openTx('${item.id}','out')">출고</button>
          <button class="btn btn-gray btn-sm" onclick="openEdit('${item.id}')">수정</button>
        </td>
      </tr>`;
    }).join('');
  }

  function renderHistory(hist) {
    const tbody = document.getElementById('histTbody');
    if (!hist.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty">이력이 없습니다.</td></tr>';
      return;
    }
    tbody.innerHTML = hist.map(h => {
      const dt = new Date(h.created_at);
      const dateStr = dt.toLocaleDateString('ko-KR') + ' ' + dt.toLocaleTimeString('ko-KR', {hour:'2-digit',minute:'2-digit'});
      const badge = h.type === 'in'
        ? '<span class="badge badge-in">입고</span>'
        : '<span class="badge badge-out">출고</span>';
      return `<tr>
        <td style="color:#6b7280;font-size:13px">${dateStr}</td>
        <td>${h.item_name}</td>
        <td>${badge}</td>
        <td style="text-align:right;font-weight:600">${h.quantity}</td>
        <td style="color:#6b7280">${h.memo || '-'}</td>
        <td style="color:#6b7280;font-size:13px">${h.user_email || '-'}</td>
      </tr>`;
    }).join('');
  }

  // ── 탭 ──
  function switchTab(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
    if (name === 'history') { loadHistory(); updateTodayCount(); }
  }

  // ── 품목 추가 ──
  function openAddModal() {
    document.getElementById('newName').value = '';
    document.getElementById('newQty').value = '';
    document.getElementById('newMinQty').value = '';
    document.getElementById('addModal').classList.add('open');
  }

  async function addItem() {
    const name = document.getElementById('newName').value.trim();
    const qty = parseInt(document.getElementById('newQty').value) || 0;
    const minQty = parseInt(document.getElementById('newMinQty').value) || 0;
    if (!name) { alert('품목명을 입력해주세요.'); return; }
    const { error } = await sb.from('items').insert({ name, quantity: qty, min_qty: minQty });
    if (error) { alert('추가 실패: ' + error.message); return; }
    closeModal('addModal');
    await loadItems();
    updateSummary();
  }

  // ── 입출고 ──
  function openTx(id, type) {
    txItem = items.find(i => i.id === id);
    txType = type;
    document.getElementById('txTitle').textContent = type === 'in' ? '입고' : '출고';
    document.getElementById('txQty').value = '';
    document.getElementById('txMemo').value = '';
    document.getElementById('txModal').classList.add('open');
  }

  async function doTransaction() {
    const qty = parseInt(document.getElementById('txQty').value);
    const memo = document.getElementById('txMemo').value.trim();
    if (!qty || qty <= 0) { alert('수량을 입력해주세요.'); return; }
    if (txType === 'out' && qty > txItem.quantity) { alert('출고 수량이 현재 재고보다 많습니다.'); return; }
    const newQty = txType === 'in' ? txItem.quantity + qty : txItem.quantity - qty;
    const { error: e1 } = await sb.from('items').update({ quantity: newQty }).eq('id', txItem.id);
    if (e1) { alert('오류: ' + e1.message); return; }
    await sb.from('history').insert({
      item_id: txItem.id, item_name: txItem.name,
      type: txType, quantity: qty, memo,
      user_email: currentUser.email
    });
    closeModal('txModal');
    await loadItems();
    updateSummary();
  }

  // ── 수정 ──
  function openEdit(id) {
    editItem = items.find(i => i.id === id);
    document.getElementById('editName').value = editItem.name;
    document.getElementById('editQty').value = editItem.quantity;
    document.getElementById('editMinQty').value = editItem.min_qty;
    document.getElementById('editModal').classList.add('open');
  }

  async function saveEdit() {
    const name = document.getElementById('editName').value.trim();
    const qty = parseInt(document.getElementById('editQty').value) || 0;
    const minQty = parseInt(document.getElementById('editMinQty').value) || 0;
    if (!name) { alert('품목명을 입력해주세요.'); return; }
    const { error } = await sb.from('items').update({ name, quantity: qty, min_qty: minQty }).eq('id', editItem.id);
    if (error) { alert('오류: ' + error.message); return; }
    closeModal('editModal');
    await loadItems();
    updateSummary();
  }

  // ── 모달 닫기 ──
  function closeModal(id) {
    document.getElementById(id).classList.remove('open');
  }

  document.querySelectorAll('.modal-bg').forEach(bg => {
    bg.addEventListener('click', function(e) {
      if (e.target === this) this.classList.remove('open');
    });
  });
</script>
</body>
</html>
